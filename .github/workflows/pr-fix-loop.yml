name: PR Fix Loop

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to fix (defaults to the PR that triggered this)"
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  fix-loop:
    # Anti-loop: no correr en forks ni en commits auto-fix [skip-ci-fix]
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.head_commit.message, '[skip-ci-fix]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # SEC-013: npm ci (reproducible desde lockfile) + registry oficial.
        env:
          npm_config_registry: https://registry.npmjs.org
        run: |
          pip install -e ".[dev]"
          npm ci
          cd frontend && npm ci && cd ..

      - name: Run PR Fix Loop
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          node scripts/pr-fix-loop.js --ship --merge --pr "$PR_NUM"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
