name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pango/GTK via MSYS2 (for WeasyPrint)
        run: |
          C:\msys64\usr\bin\bash -lc 'pacman -S mingw-w64-x86_64-pango --noconfirm'
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          if (Test-Path "C:\msys64\mingw64\bin\python.exe") {
            Remove-Item "C:\msys64\mingw64\bin\python.exe" -Force
          }
          echo "WEASYPRINT_DLL_DIRECTORIES=C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        # SEC-013: npm ci (reproducible desde lockfile) + registry oficial.
        env:
          npm_config_registry: https://registry.npmjs.org
        run: |
          npm ci
          cd frontend
          npm ci
          cd ..
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Run CI checks
        run: npm run ci

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:frontend

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SEC-005: firma de código Windows. Con secrets vacíos, electron-builder
          # firma omite la firma (build sin firma = comportamiento actual).
          # WINDOWS_CERT_B64 = base64 del .pfx; WINDOWS_CERT_PASSWORD = passphrase.
          # Con cert presente, enable-build-signing.js flípea verifyUpdateCodeSignature
          # a true para que electron-updater verifique las firmas de los updates.
          CSC_LINK: ${{ secrets.WINDOWS_CERT_B64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          node scripts/enable-build-signing.js
          npx electron-builder --win --publish always
