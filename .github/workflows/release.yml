name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pango/GTK via MSYS2 (for WeasyPrint)
        run: |
          C:\msys64\usr\bin\bash -lc 'pacman -S mingw-w64-x86_64-pango --noconfirm'
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          if (Test-Path "C:\msys64\mingw64\bin\python.exe") {
            Remove-Item "C:\msys64\mingw64\bin\python.exe" -Force
          }
          echo "WEASYPRINT_DLL_DIRECTORIES=C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        run: |
          npm install
          cd frontend
          npm install
          cd ..
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Run CI checks
        run: npm run ci

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
