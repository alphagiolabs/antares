name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org
        run: |
          npm ci
          cd frontend && npm ci
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Run CI checks
        run: npm run ci

  build-windows:
    name: Build Windows
    needs: ci
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pango/GTK via MSYS2 (for WeasyPrint)
        run: |
          C:\msys64\usr\bin\bash -lc 'pacman -S mingw-w64-x86_64-pango --noconfirm'
          echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          if (Test-Path "C:\msys64\mingw64\bin\python.exe") {
            Remove-Item "C:\msys64\mingw64\bin\python.exe" -Force
          }
          echo "WEASYPRINT_DLL_DIRECTORIES=C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org
        run: |
          npm ci
          cd frontend && npm ci
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:frontend

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WINDOWS_CERT_B64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          node scripts/enable-build-signing.js
          npx electron-builder --win --publish always

  build-macos:
    name: Build macOS
    needs: ci
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (WeasyPrint)
        run: |
          brew install pango gdk-pixbuf libffi

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org
        run: |
          npm ci
          cd frontend && npm ci
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:frontend

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always

  build-linux:
    name: Build Linux
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libgdk-pixbuf2.0-dev libffi-dev rpm

      - name: Install dependencies
        env:
          npm_config_registry: https://registry.npmjs.org
        run: |
          npm ci
          cd frontend && npm ci
          pip install pyinstaller
          pip install -e ".[dev]"

      - name: Build Backend
        run: npm run build:backend

      - name: Build Frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:frontend

      - name: Build and Publish Electron App
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish always
