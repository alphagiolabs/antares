appId: com.antares.app
productName: Antares
copyright: Copyright © 2026 ANTARES
directories:
  output: dist-electron
  buildResources: assets
compression: maximum
files:
  # ── Exclude non-runtime directories ──────────────────────────────────────
  - "!frontend/src/**/*"
  - "!frontend/public/**/*"
  - "!tests/**/*"
  - "!backend/**/*"
  - "!scripts/**/*"
  - "!docs/**/*"
  - "!data/**/*"
  - "!build/**/*"
  - "!dist/**/*"
  - "!**/.git/**/*"
  - "!**/.factory/**/*"
  - "!**/.github/**/*"
  # ── Include runtime files ────────────────────────────────────────────────
  - "frontend/dist/**/*"
  - "electron/**/*"
  - "shared/**/*"
  - "assets/icon.ico"
  # ── node_modules: include all, then exclude dev-only packages ────────────
  # Order matters: last matching rule wins in electron-builder.
  - "node_modules/**/*"
  # Strip .bin, .cache, sourcemaps, TypeScript sources, and test/doc dirs
  - "!**/node_modules/.bin/**/*"
  - "!**/node_modules/.cache/**/*"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/*.ts"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/test/**/*"
  - "!**/node_modules/**/tests/**/*"
  - "!**/node_modules/**/docs/**/*"
  - "!node_modules/**/examples/**/*"
  # Documentation and metadata files (~15-20% of node_modules)
  - "!**/node_modules/**/*.md"
  - "!**/node_modules/**/*.txt"
  - "!**/node_modules/**/*.yml"
  - "!**/node_modules/**/*.yaml"
  - "!**/node_modules/**/*.rst"
  # Config files not needed at runtime
  - "!**/node_modules/**/.eslintrc*"
  - "!**/node_modules/**/.prettierrc*"
  - "!**/node_modules/**/.editorconfig"
  - "!**/node_modules/**/tsconfig*.json"
  - "!**/node_modules/**/.npmignore"
  - "!**/node_modules/**/.gitignore"
  - "!**/node_modules/**/Makefile"
  - "!**/node_modules/**/Gruntfile*"
  - "!**/node_modules/**/Gulpfile*"
  # Test and coverage directories
  - "!**/node_modules/**/__tests__/**/*"
  - "!**/node_modules/**/__mocks__/**/*"
  - "!**/node_modules/**/coverage/**/*"
  - "!**/node_modules/**/.nyc_output/**/*"
  # TypeScript declaration subdirectories (src/, lib/ with .d.ts only)
  - "!**/node_modules/**/src/**/*.d.ts"
  # CI/CD and build configs
  - "!**/node_modules/**/.github/**/*"
  - "!**/node_modules/**/.circleci/**/*"
  - "!**/node_modules/**/.travis.yml"
  - "!**/node_modules/**/appveyor.yml"
  - "!**/node_modules/**/.gitlab-ci.yml"
  # Package metadata files (not needed at runtime)
  - "!**/node_modules/**/package.json"
  - "!**/node_modules/**/package-lock.json"
  - "!**/node_modules/**/yarn.lock"
  - "!**/node_modules/**/pnpm-lock.yaml"
  # License and readme files (keep root licenses only)
  - "!**/node_modules/**/LICENSE*"
  - "!**/node_modules/**/LICENCE*"
  - "!**/node_modules/**/COPYING*"
  - "!**/node_modules/**/AUTHORS*"
  - "!**/node_modules/**/CONTRIBUTORS*"
  # Changelogs and history
  - "!**/node_modules/**/CHANGELOG*"
  - "!**/node_modules/**/CHANGES*"
  - "!**/node_modules/**/HISTORY*"
  # Dev-only packages: must ship zero bytes of these in the installer
  - "!node_modules/concurrently/**/*"
  - "!node_modules/wait-on/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"
  - "!node_modules/electron-builder-squirrel-windows/**/*"
  - "!node_modules/app-builder-lib/**/*"
  - "!node_modules/builder-util/**/*"
  - "!node_modules/builder-util-runtime/**/*"
  - "!node_modules/dmg-builder/**/*"
  - "!node_modules/electron-publish/**/*"
  - "!node_modules/electron-rebuild/**/*"
  - "!node_modules/@electron/**/*"
  # Build-only native binaries and dev tooling hoisted to top-level node_modules
  - "!node_modules/app-builder-bin/**/*"
  - "!node_modules/7zip-bin/**/*"
  - "!node_modules/typescript/**/*"
  - "!node_modules/node-gyp/**/*"
  - "!node_modules/@types/**/*"
  - "!node_modules/rxjs/**/*"
  - "!node_modules/lodash/**/*"
  - "!node_modules/axios/**/*"
  - "!node_modules/config-file-ts/**/*"
  - "!node_modules/path-scurry/**/*"
  - "!node_modules/async/**/*"
  # Additional dev-only packages not needed at runtime (~45 MB savings)
  - "!node_modules/electron-winstaller/**/*"
  - "!node_modules/postject/**/*"
  - "!node_modules/@electron-internal/**/*"
  - "!node_modules/jiti/**/*"
  - "!node_modules/pkijs/**/*"
  # Runtime-unnecessary packages (~15 MB savings)
  - "!node_modules/undici/**/*"          # HTTP client not needed (browser fetch)
  - "!node_modules/tar/**/*"             # Archive handling not needed at runtime
  - "!node_modules/ajv/**/*"             # JSON schema validation not needed
  - "!node_modules/fast-json-stable/**/*" # JSON sorting not needed
  - "!node_modules/json-schema-traverse/**/*"
extraResources:
  - from: formatos
    to: formatos
    filter: ["**/*"]
  - from: dist/AntaresBackend
    to: backend/AntaresBackend
    filter: ["**/*"]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico
  legalTrademarks: "ANTARES"
  requestedExecutionLevel: asInvoker
  # SEC-005: false por defecto — los builds sin firma necesitan que
  # electron-updater NO verifique firma para aceptar updates. scripts/enable-
  # build-signing.js lo flípea a true en CI sólo cuando CSC_LINK (mapeado desde
  # secrets.WINDOWS_CERT_B64 en release.yml) está presente (build firmado);
  # entonces electron-updater rechaza updates no firmados/con firma inválida.
  # Una vez exista un release firmado, puede quedarse true permanente aquí.
  verifyUpdateCodeSignature: false
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.utilities
  icon: assets/icon.icns
  # SEC-005: firma macOS deshabilitada por ahora. Para activar:
  # 1. Agregar secrets APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID al workflow
  # 2. Agregar CSC_LINK (p12) y CSC_KEY_PASSWORD
  # 3. Descomentar hardenedRuntime + sign + entitlements
  hardenedRuntime: false
  gatekeeperAssess: false
  sign: false
  # entitlements: build/entitlements.mac.plist
  # entitlementsInherit: build/entitlements.mac.plist
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  icon: assets/icon.png
  maintainer: "ANTARES"
  vendor: "ANTARES"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Antares
  uninstallDisplayName: "Antares"
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  artifactName: "Antares-Setup-${version}.exe"
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: true
  displayLanguageSelector: false
portable:
  artifactName: "Antares-Portable-${version}.exe"
dmg:
  artifactName: "Antares-${version}-${arch}.dmg"
  icon: assets/icon.icns
  # SEC-005: sin firma macOS por ahora. Ver nota en sección mac.
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
publish:
  provider: github
  owner: sechgio
  repo: antares
  releaseType: release
asar: true
# Only unpack truly native modules (.node binaries) so they're loadable from disk.
# Everything else stays inside app.asar to keep the install footprint small.
asarUnpack:
  - "**/*.node"
  - "node_modules/**/build/Release/*.node"
electronLanguages:
  - es
  - en-US
