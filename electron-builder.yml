appId: com.cosmo.app
productName: COSMO
copyright: Copyright © 2026 COSMO
directories:
  output: dist-electron
  buildResources: assets
compression: maximum
files:
  - "!frontend/src/**/*"
  - "!frontend/public/**/*"
  - "!tests/**/*"
  - "!backend/**/*"
  - "!scripts/**/*"
  - "!docs/**/*"
  - "!data/**/*"
  - "!build/**/*"
  - "!dist/**/*"
  - "!**/.git/**/*"
  - "!**/.factory/**/*"
  - "!**/.github/**/*"
  - "!**/node_modules/.bin/**/*"
  - "!**/node_modules/.cache/**/*"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/*.ts"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/test/**/*"
  - "!**/node_modules/**/tests/**/*"
  - "!**/node_modules/**/docs/**/*"
  - "!**/node_modules/**/examples/**/*"
  - "!**/node_modules/**/README*"
  - "!**/node_modules/**/CHANGELOG*"
  - "!**/node_modules/**/LICENSE*"
  - "!node_modules/concurrently/**/*"
  - "!node_modules/wait-on/**/*"
  - "!node_modules/electron/**/*"
  - "!node_modules/electron-builder/**/*"
  - "!node_modules/electron-builder-squirrel-windows/**/*"
  - "!node_modules/app-builder-lib/**/*"
  - "!node_modules/builder-util/**/*"
  - "!node_modules/builder-util-runtime/**/*"
  - "!node_modules/dmg-builder/**/*"
  - "!node_modules/electron-publish/**/*"
  - "!node_modules/electron-rebuild/**/*"
  - "!node_modules/@electron/**/*"
  - "frontend/dist/**/*"
  - "electron/**/*"
  - "assets/icon.ico"
  - "node_modules/**/*"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/*.ts"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/test/**/*"
  - "!**/node_modules/**/tests/**/*"
  - "!**/node_modules/**/docs/**/*"
  - "!**/node_modules/**/examples/**/*"
  - "!**/node_modules/**/README*"
  - "!**/node_modules/**/CHANGELOG*"
extraResources:
  - from: formatos
    to: formatos
    filter: ["**/*"]
  - from: dist
    to: backend
    filter: ["CosmoBackend*"]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico
  legalTrademarks: "COSMO"
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: true
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.utilities
  icon: assets/icon_512.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  icon: assets/icon.png
  maintainer: "COSMO"
  vendor: "COSMO"
snap:
  grade: stable
  confinement: strict
  summary: "Conversor y renombrador profesional de imágenes"
  publish:
    provider: snapStore
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: COSMO
  uninstallDisplayName: "COSMO"
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  artifactName: "COSMO-Setup-${version}.exe"
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: true
  displayLanguageSelector: false
portable:
  artifactName: "COSMO-Portable-${version}.exe"
dmg:
  artifactName: "COSMO-${version}-${arch}.dmg"
  icon: assets/icon_512.png
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
publish:
  provider: github
  owner: HIDROAA
  repo: hidro_convert
  releaseType: release
asar: true
electronLanguages:
  - es
  - en-US
